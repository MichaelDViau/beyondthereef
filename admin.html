<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Admin — Beyond the Reef</title>

<!-- Firebase SDK (compat mode) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<!-- Calendar -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

<style>
:root {
  --navy:      #0f2040;
  --navy2:     #1a3260;
  --teal:      #00b4d8;
  --bg:        #f1f5f9;
  --card:      #ffffff;
  --text:      #1e293b;
  --muted:     #64748b;
  --border:    #e2e8f0;
  --pending:   #f59e0b;
  --confirmed: #10b981;
  --cancelled: #9ca3af;
  --radius:    12px;
}
*  { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
       background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── LOGIN ─────────────────────────────────────────────── */
#loginWrap {
  min-height: 100vh; display: flex; align-items: center;
  justify-content: center; background: var(--navy); padding: 1.5rem;
}
#loginBox {
  background: white; border-radius: var(--radius);
  padding: 2.5rem 2rem; width: 100%; max-width: 380px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.35);
}
.login-logo { text-align: center; margin-bottom: 1.75rem; }
.login-logo strong { display: block; font-size: 1.3rem; font-weight: 800; color: var(--navy); }
.login-logo small  { font-size: 0.78rem; color: var(--muted); margin-top: 3px; display: block; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--muted);
               text-transform: uppercase; letter-spacing: .06em; margin-bottom: .35rem; }
.field input { width: 100%; padding: .7rem 1rem; border: 1.5px solid var(--border);
               border-radius: 8px; font-size: .95rem; outline: none; transition: border-color .15s; }
.field input:focus { border-color: var(--teal); }
#loginBtn { width: 100%; padding: .8rem; background: var(--navy); color: white; border: none;
            border-radius: 8px; font-size: .95rem; font-weight: 700; cursor: pointer;
            margin-top: .5rem; transition: background .15s; }
#loginBtn:hover { background: var(--navy2); }
#loginErr { color: #ef4444; font-size: .85rem; margin-top: .75rem; text-align: center; display: none; }

/* ── DASHBOARD ─────────────────────────────────────────── */
#dashWrap { display: none; flex-direction: column; min-height: 100vh; }

header {
  background: var(--navy); color: white; height: 58px;
  padding: 0 1.25rem; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0;
  z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.hd-brand strong { font-size: 1rem; font-weight: 800; letter-spacing: -.3px; }
.hd-brand small  { display: block; font-size: .68rem; color: rgba(255,255,255,.45); margin-top: 1px; }
#logoutBtn { background: rgba(255,255,255,.12); border: none; color: white;
             padding: .4rem .9rem; border-radius: 6px; cursor: pointer;
             font-size: .82rem; font-weight: 600; }
#logoutBtn:hover { background: rgba(255,255,255,.22); }

nav {
  background: white; border-bottom: 1px solid var(--border);
  display: flex; padding: 0 1rem; position: sticky; top: 58px; z-index: 99;
  overflow-x: auto;
}
.tab {
  padding: .9rem 1.1rem; font-size: .88rem; font-weight: 600; color: var(--muted);
  cursor: pointer; border-bottom: 2.5px solid transparent; white-space: nowrap;
  display: flex; align-items: center; gap: .4rem; transition: all .15s; user-select: none;
}
.tab.active  { color: var(--navy); border-bottom-color: var(--teal); }
.tab:hover   { color: var(--text); }
.badge { background: var(--pending); color: white; border-radius: 999px; font-size: .7rem;
         font-weight: 800; padding: .1rem .45rem; min-width: 18px; text-align: center; }
.badge.hidden { display: none; }

main { padding: 1.25rem; max-width: 860px; margin: 0 auto; width: 100%; }

.view        { display: none; }
.view.active { display: block; }

.sec-title { font-size: .72rem; font-weight: 700; text-transform: uppercase;
             letter-spacing: .08em; color: var(--muted); margin-bottom: .75rem; }

/* Booking cards */
.bk-card {
  background: white; border-radius: var(--radius); padding: 1rem 1.1rem;
  margin-bottom: .65rem; border: 1.5px solid var(--border); cursor: pointer;
  display: flex; gap: .9rem; align-items: flex-start;
  transition: border-color .15s, box-shadow .15s;
}
.bk-card:hover { border-color: var(--teal); box-shadow: 0 4px 18px rgba(0,180,216,.1); }
.bk-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--pending);
           flex-shrink: 0; margin-top: 5px; }
.bk-info { flex: 1; min-width: 0; }
.bk-tour { font-weight: 700; font-size: .93rem; margin-bottom: .25rem;
           white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bk-meta { font-size: .8rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: .4rem; }
.bk-aside { flex-shrink: 0; text-align: right; display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
.bk-time { font-size: .72rem; color: var(--muted); }

.pill { display: inline-block; padding: .15rem .5rem; border-radius: 999px;
        font-size: .68rem; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; }
.pill.pending   { background: #fef3c7; color: #92400e; }
.pill.confirmed { background: #d1fae5; color: #065f46; }
.pill.cancelled { background: #f3f4f6; color: #4b5563; }

.empty      { text-align: center; padding: 3.5rem 1rem; color: var(--muted); }
.empty-icon { font-size: 2.5rem; margin-bottom: .75rem; }
.empty-msg  { font-size: .9rem; }

/* Calendar */
#calWrap { background: white; border-radius: var(--radius); padding: 1rem 1.25rem;
           border: 1px solid var(--border); }
.fc-toolbar-title  { font-size: 1rem !important; font-weight: 700 !important; }
.fc-button-primary { background: var(--navy) !important; border-color: var(--navy) !important; }

/* Filters */
.filter-row { display: flex; gap: .5rem; margin-bottom: 1rem; flex-wrap: wrap; }
.filt-btn { padding: .4rem .9rem; border-radius: 999px; border: 1.5px solid var(--border);
            background: white; font-size: .8rem; font-weight: 600; cursor: pointer;
            color: var(--muted); transition: all .15s; }
.filt-btn.active { background: var(--navy); color: white; border-color: var(--navy); }

/* Modal */
#modalBg {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 200; align-items: flex-end; justify-content: center;
}
#modalBg.open { display: flex; }
@media (min-width: 600px) { #modalBg { align-items: center; padding: 1rem; } }

#modal {
  background: white; width: 100%; max-width: 500px;
  border-radius: 20px 20px 0 0; max-height: 92vh; overflow-y: auto;
  padding: 1.5rem 1.25rem 2rem; position: relative;
}
@media (min-width: 600px) { #modal { border-radius: var(--radius); } }

.modal-close { position: absolute; top: 1rem; right: 1rem; background: var(--bg);
               border: none; width: 30px; height: 30px; border-radius: 50%;
               cursor: pointer; font-size: 1rem; line-height: 1; }
.modal-tour   { font-size: 1.15rem; font-weight: 800; margin-bottom: .3rem; padding-right: 2.5rem; }

hr.div { border: none; border-top: 1px solid var(--border); margin: 1.1rem 0; }

.detail-grid { display: grid; gap: .6rem; }
.detail-row  { display: flex; gap: .75rem; font-size: .88rem; }
.detail-lbl  { color: var(--muted); font-weight: 700; min-width: 68px; flex-shrink: 0; }
.detail-val  { word-break: break-word; }
.detail-val a { color: var(--teal); text-decoration: none; }

.modal-actions { display: flex; gap: .6rem; flex-wrap: wrap; }
.act-btn { flex: 1; min-width: 90px; padding: .7rem .5rem; border-radius: 8px;
           font-size: .85rem; font-weight: 700; cursor: pointer; border: 2px solid transparent;
           transition: all .15s; text-align: center; }
.act-confirm { background: var(--confirmed); color: white; border-color: var(--confirmed); }
.act-confirm:hover { opacity: .85; }
.act-decline { background: white; color: var(--muted); border-color: var(--border); }
.act-decline:hover { border-color: #9ca3af; }
.act-delete  { background: white; color: #ef4444; border-color: #fca5a5; }
.act-delete:hover  { background: #fef2f2; }
.act-wa { background: #25d366; color: white; border-color: #25d366; font-size: .8rem; }
.act-wa:hover { opacity: .85; }

@media (max-width: 400px) {
  .tab { padding: .9rem .7rem; font-size: .82rem; }
}
</style>
</head>
<body>

<!-- ══ LOGIN ════════════════════════════════════════════════════ -->
<div id="loginWrap">
  <div id="loginBox">
    <div class="login-logo">
      <strong>Beyond the Reef</strong>
      <small>Booking Management</small>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="lEmail" placeholder="you@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="lPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button id="loginBtn">Sign In</button>
    <p id="loginErr"></p>
  </div>
</div>

<!-- ══ DASHBOARD ════════════════════════════════════════════════ -->
<div id="dashWrap">
  <header>
    <div class="hd-brand">
      <strong>Beyond the Reef</strong>
      <small>Booking Admin</small>
    </div>
    <button id="logoutBtn">Sign Out</button>
  </header>

  <nav>
    <div class="tab active" data-view="inbox">
      📥 Requests
      <span class="badge hidden" id="inboxBadge">0</span>
    </div>
    <div class="tab" data-view="calendar">📅 Calendar</div>
    <div class="tab" data-view="all">📋 All Bookings</div>
  </nav>

  <main>
    <!-- INBOX: pending requests -->
    <div class="view active" id="view-inbox">
      <div class="sec-title">Pending booking requests</div>
      <div id="inboxList"></div>
    </div>

    <!-- CALENDAR: confirmed bookings -->
    <div class="view" id="view-calendar">
      <div id="calWrap"><div id="calendar"></div></div>
    </div>

    <!-- ALL BOOKINGS -->
    <div class="view" id="view-all">
      <div class="filter-row">
        <button class="filt-btn active" data-filter="all">All</button>
        <button class="filt-btn" data-filter="pending">Pending</button>
        <button class="filt-btn" data-filter="confirmed">Confirmed</button>
        <button class="filt-btn" data-filter="cancelled">Cancelled</button>
      </div>
      <div id="allList"></div>
    </div>
  </main>
</div>

<!-- ══ BOOKING DETAIL MODAL ════════════════════════════════════ -->
<div id="modalBg">
  <div id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-tour" id="mTour"></div>
    <div id="mStatus"></div>
    <hr class="div">
    <div class="detail-grid" id="mDetails"></div>
    <hr class="div">
    <div class="modal-actions" id="mActions"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  FIREBASE CONFIGURATION — fill this in once
//
//  How to get these values:
//  1. Go to https://console.firebase.google.com
//  2. Click "Add project" and follow the steps
//  3. In your project, click the </> (Web) icon to add a web app
//  4. Copy the firebaseConfig object values below
//  5. Also fill in the same apiKey and projectId in booking-notify.js
// ════════════════════════════════════════════════════════════════
var FIREBASE_CFG = {
  apiKey:            'YOUR_API_KEY',
  authDomain:        'YOUR_PROJECT_ID.firebaseapp.com',
  projectId:         'YOUR_PROJECT_ID',
  storageBucket:     'YOUR_PROJECT_ID.appspot.com',
  messagingSenderId: 'YOUR_SENDER_ID',
  appId:             'YOUR_APP_ID'
};
// ════════════════════════════════════════════════════════════════

firebase.initializeApp(FIREBASE_CFG);
var auth = firebase.auth();
var db   = firebase.firestore();

var allBookings  = [];
var calInstance  = null;
var activeFilter = 'all';
var currentBkId  = null;

// ── LOGIN ────────────────────────────────────────────────────
document.getElementById('loginBtn').onclick = function () {
  var email = document.getElementById('lEmail').value.trim();
  var pass  = document.getElementById('lPass').value;
  var err   = document.getElementById('loginErr');
  err.style.display = 'none';
  if (!email || !pass) { err.textContent = 'Please enter email and password.'; err.style.display = 'block'; return; }
  auth.signInWithEmailAndPassword(email, pass).catch(function () {
    err.textContent = 'Incorrect email or password.';
    err.style.display = 'block';
  });
};
document.getElementById('lPass').onkeydown = function (e) { if (e.key === 'Enter') document.getElementById('loginBtn').click(); };
document.getElementById('logoutBtn').onclick = function () { auth.signOut(); };

auth.onAuthStateChanged(function (user) {
  if (user) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashWrap').style.display  = 'flex';
    startListening();
    initCalendar();
  } else {
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('dashWrap').style.display  = 'none';
  }
});

// ── REAL-TIME LISTENER ────────────────────────────────────────
function startListening() {
  db.collection('bookings')
    .orderBy('createdAt', 'desc')
    .onSnapshot(function (snap) {
      allBookings = snap.docs.map(function (d) { return Object.assign({ id: d.id }, d.data()); });
      renderAll();
    }, function (err) {
      console.error('Firestore error:', err);
    });
}

// ── RENDER ────────────────────────────────────────────────────
function renderAll() {
  renderInbox();
  renderAllList();
  renderCalendar();
}

function renderInbox() {
  var pending = allBookings.filter(function (b) { return (b.status || 'pending') === 'pending'; });
  var badge   = document.getElementById('inboxBadge');
  badge.textContent = pending.length;
  badge.classList.toggle('hidden', pending.length === 0);
  document.title = pending.length > 0
    ? '(' + pending.length + ') Admin — Beyond the Reef'
    : 'Admin — Beyond the Reef';

  var el = document.getElementById('inboxList');
  if (!pending.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-msg">No pending requests — you\'re all caught up!</div></div>';
    return;
  }
  el.innerHTML = pending.map(function (b) { return cardHTML(b, true); }).join('');
  attachCardClicks(el);
}

function renderAllList() {
  var list = activeFilter === 'all'
    ? allBookings
    : allBookings.filter(function (b) { return (b.status || 'pending') === activeFilter; });

  var el = document.getElementById('allList');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-msg">No bookings here yet</div></div>';
    return;
  }
  el.innerHTML = list.map(function (b) { return cardHTML(b, false); }).join('');
  attachCardClicks(el);
}

function attachCardClicks(container) {
  container.querySelectorAll('.bk-card').forEach(function (el) {
    el.onclick = function () { openModal(el.dataset.id); };
  });
}

function cardHTML(b, showDot) {
  var status = b.status || 'pending';
  var ago    = b.createdAt ? timeAgo(b.createdAt.toDate ? b.createdAt.toDate() : new Date(b.createdAt)) : '';
  return (
    '<div class="bk-card" data-id="' + b.id + '">' +
    (showDot ? '<div class="bk-dot"></div>' : '') +
    '<div class="bk-info">' +
      '<div class="bk-tour">' + esc(b.tour) + '</div>' +
      '<div class="bk-meta">' +
        '<span>' + esc(b.name) + '</span>' +
        (b.date && b.date !== 'TBD' ? '<span>· ' + esc(b.date) + '</span>' : '') +
        (b.pricing ? '<span>· ' + esc(b.pricing) + '</span>' : '') +
      '</div>' +
    '</div>' +
    '<div class="bk-aside">' +
      '<span class="pill ' + status + '">' + status + '</span>' +
      (ago ? '<span class="bk-time">' + ago + '</span>' : '') +
    '</div>' +
    '</div>'
  );
}

// ── CALENDAR ─────────────────────────────────────────────────
function initCalendar() {
  calInstance = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView:   'dayGridMonth',
    headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listWeek' },
    height:        'auto',
    eventClick:    function (info) { openModal(info.event.extendedProps.bkId); }
  });
  calInstance.render();
}

function renderCalendar() {
  if (!calInstance) return;
  calInstance.removeAllEvents();
  var events = allBookings
    .filter(function (b) { return (b.status || 'pending') === 'confirmed' && b.date && b.date !== 'TBD'; })
    .map(function (b) {
      var start = parseDate(b.date);
      if (!start) return null;
      return {
        id:              b.id,
        title:           (b.tour || 'Tour') + ' — ' + (b.name || ''),
        start:           start,
        backgroundColor: '#10b981',
        borderColor:     '#059669',
        extendedProps:   { bkId: b.id }
      };
    })
    .filter(Boolean);
  calInstance.addEventSource(events);
}

function parseDate(str) {
  if (!str) return null;
  var d = new Date(str);
  return isNaN(d) ? null : d.toISOString().split('T')[0];
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(id) {
  var b = allBookings.find(function (x) { return x.id === id; });
  if (!b) return;
  currentBkId = id;
  var status = b.status || 'pending';

  document.getElementById('mTour').textContent   = b.tour || 'Booking';
  document.getElementById('mStatus').innerHTML   = '<span class="pill ' + status + '">' + status + '</span>';

  var rows = [
    ['Name',   esc(b.name)],
    ['Date',   esc(b.date || 'TBD')],
    ['Guests', esc(b.pricing)],
    ['Email',  b.email ? '<a href="mailto:' + esc(b.email) + '">' + esc(b.email) + '</a>' : '—'],
    ['Phone',  b.phone && b.phone !== 'N/A' ? '<a href="tel:' + esc(b.phone) + '">' + esc(b.phone) + '</a>' : '—'],
    ['Hotel',  esc(b.hotel)],
    ['Notes',  esc(b.notes)]
  ];
  document.getElementById('mDetails').innerHTML = rows.map(function (r) {
    return '<div class="detail-row"><span class="detail-lbl">' + r[0] + '</span><span class="detail-val">' + r[1] + '</span></div>';
  }).join('');

  var acts = '';
  if (status !== 'confirmed') {
    acts += '<button class="act-btn act-confirm" onclick="setStatus(\'' + id + '\',\'confirmed\')">✓ Confirm</button>';
  }
  if (status !== 'cancelled') {
    acts += '<button class="act-btn act-decline" onclick="setStatus(\'' + id + '\',\'cancelled\')">✗ Decline</button>';
  }
  if (b.phone && b.phone !== 'N/A') {
    var waNum = b.phone.replace(/\D/g,'');
    var waTxt = encodeURIComponent('Hi ' + (b.name || 'there') + ', thank you for your booking request for the ' + (b.tour || 'tour') + '! ');
    acts += '<button class="act-btn act-wa" onclick="window.open(\'https://wa.me/' + waNum + '?text=' + waTxt + '\',\'_blank\')">💬 WhatsApp Guest</button>';
  }
  acts += '<button class="act-btn act-delete" onclick="deleteBk(\'' + id + '\')">🗑 Delete</button>';
  document.getElementById('mActions').innerHTML = acts;

  document.getElementById('modalBg').classList.add('open');
}

document.getElementById('modalClose').onclick = closeModal;
document.getElementById('modalBg').onclick = function (e) { if (e.target === this) closeModal(); };

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  currentBkId = null;
}

function setStatus(id, status) {
  db.collection('bookings').doc(id).update({ status: status }).then(closeModal);
}

function deleteBk(id) {
  if (!confirm('Delete this booking? This cannot be undone.')) return;
  db.collection('bookings').doc(id).delete().then(closeModal);
}

// ── TABS ──────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(function (tab) {
  tab.onclick = function () {
    document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
    document.querySelectorAll('.view').forEach(function (v) { v.classList.remove('active'); });
    tab.classList.add('active');
    document.getElementById('view-' + tab.dataset.view).classList.add('active');
    if (tab.dataset.view === 'calendar' && calInstance) calInstance.updateSize();
  };
});

// ── FILTERS ───────────────────────────────────────────────────
document.querySelectorAll('.filt-btn').forEach(function (btn) {
  btn.onclick = function () {
    document.querySelectorAll('.filt-btn').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderAllList();
  };
});

// ── HELPERS ───────────────────────────────────────────────────
function esc(s) {
  if (!s || s === 'N/A' || s === 'None') return '—';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(date) {
  var diff = Math.floor((Date.now() - date) / 1000);
  if (diff < 60)    return 'just now';
  if (diff < 3600)  return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  if (diff < 86400 * 7) return Math.floor(diff / 86400) + 'd ago';
  return date.toLocaleDateString();
}
</script>
</body>
</html>
