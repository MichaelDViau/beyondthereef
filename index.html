<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beyond The Reef Mexico | Private Tours</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="reef-app.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <button class="brand" data-go="home" aria-label="Go to home page">
          <img src="assets/logo.svg" alt="Beyond The Reef Mexico logo" />
          <span>
            <small>Beyond The Reef</small>
            <strong>Mexico Private Tours</strong>
          </span>
        </button>
        <nav class="main-nav" aria-label="Main">
          <button data-go="home" class="active">Home</button>
          <button data-go="tours">Tours</button>
          <button data-go="booking">Book Now</button>
        </nav>
      </div>
    </header>

    <main id="app" class="container"></main>

    <footer class="site-footer">
      <div class="container footer-content">
        <div class="footer-brand">
          <img src="assets/logo.svg" alt="Beyond The Reef Mexico logo" />
          <strong>Beyond The Reef Mexico</strong>
        </div>
        <p>Full website flow with homepage, tours, tour detail, and booking page.</p>
      </div>
    </footer>

    <script src="reef-app.js"></script>
  </body>
</html>
